<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>완성형 지뢰찾기 + 리더보드</title>
    <!-- Supabase JS Client CDN 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #f0f4f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .game-wrapper {
            background-color: #bdc3c7;
            padding: 15px;
            border: 4px outset #eee;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .status-bar {
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border: 2px inset #7f8c8d;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }

        #board {
            display: grid;
            background-color: #7f8c8d;
            border: 3px inset #eee;
            gap: 1px;
        }

        .cell {
            width: 30px;
            height: 30px;
            background-color: #bdc3c7;
            border: 3px outset #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            box-sizing: border-box;
        }

        .cell.revealed {
            background-color: #ecf0f1;
            border: 1px solid #bdc3c7;
        }

        .cell.mine { background-color: #e74c3c; }
        .cell.flag { color: #e67e22; }

        /* 숫자별 색상 */
        .n1 { color: #3498db; }
        .n2 { color: #27ae60; }
        .n3 { color: #e74c3c; }
        .n4 { color: #8e44ad; }

        button#reset-btn {
            padding: 5px 15px;
            cursor: pointer;
            font-weight: bold;
            background: #ecf0f1;
            border: 2px outset #eee;
        }
        button#reset-btn:active { border-style: inset; }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="status-bar">
            <div>남은 지뢰: <span id="mine-count">10</span></div>
            <button id="reset-btn">다시 시작</button>
            <div>시간: <span id="timer">0</span></div>
        </div>
        <div id="board" oncontextmenu="return false;"></div>
    </div>

    <script>
        // --- Supabase 설정 ---
        // TODO: 본인의 Supabase Project URL과 Anon Key로 변경하세요.
        const SUPABASE_URL = 'https://vnbhyhcmsqqjyqeclhrx.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_I1J2FcYWA8BTBqktKF8KIA_YrtrGtsv';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const ROWS = 10;
        const COLS = 10;
        const MINES = 12;

        let board = [];
        let revealedCount = 0;
        let gameOver = false;
        let timer = null;
        let seconds = 0;

        const boardEl = document.getElementById('board');
        const mineCountEl = document.getElementById('mine-count');
        const timerEl = document.getElementById('timer');
        const resetBtn = document.getElementById('reset-btn');

        // 게임 시작 함수
        function startGame() {
            boardEl.innerHTML = '';
            boardEl.style.gridTemplateColumns = `repeat(${COLS}, 30px)`;
            board = [];
            revealedCount = 0;
            gameOver = false;
            seconds = 0;
            clearInterval(timer);
            timerEl.innerText = 0;
            mineCountEl.innerText = MINES;

            for (let r = 0; r < ROWS; r++) {
                board[r] = [];
                for (let c = 0; c < COLS; c++) {
                    const cell = {
                        r, c,
                        isMine: false,
                        isRevealed: false,
                        isFlagged: false,
                        count: 0,
                        el: document.createElement('div')
                    };
                    
                    cell.el.classList.add('cell');
                    cell.el.addEventListener('click', () => leftClick(r, c));
                    cell.el.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        rightClick(r, c);
                    });

                    boardEl.appendChild(cell.el);
                    board[r][c] = cell;
                }
            }

            let placed = 0;
            while (placed < MINES) {
                let r = Math.floor(Math.random() * ROWS);
                let c = Math.floor(Math.random() * COLS);
                if (!board[r][c].isMine) {
                    board[r][c].isMine = true;
                    placed++;
                }
            }

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c].isMine) continue;
                    let count = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (board[r+dr] && board[r+dr][c+dc] && board[r+dr][c+dc].isMine) count++;
                        }
                    }
                    board[r][c].count = count;
                }
            }

            timer = setInterval(() => {
                seconds++;
                timerEl.innerText = seconds;
            }, 1000);
        }

        function leftClick(r, c) {
            if (gameOver) return;
            const cell = board[r][c];
            if (cell.isRevealed || cell.isFlagged) return;

            if (cell.isMine) {
                endGame(false);
                return;
            }

            reveal(r, c);

            if (revealedCount === (ROWS * COLS) - MINES) {
                endGame(true);
            }
        }

        function reveal(r, c) {
            const cell = board[r][c];
            if (cell.isRevealed || cell.isFlagged) return;

            cell.isRevealed = true;
            cell.el.classList.add('revealed');
            cell.el.style.border = '1px solid #ccc';
            revealedCount++;

            if (cell.count > 0) {
                cell.el.innerText = cell.count;
                cell.el.classList.add('n' + cell.count);
            } else {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (board[r+dr] && board[r+dr][c+dc]) reveal(r+dr, c+dc);
                    }
                }
            }
        }

        function rightClick(r, c) {
            if (gameOver) return;
            const cell = board[r][c];
            if (cell.isRevealed) return;

            cell.isFlagged = !cell.isFlagged;
            cell.el.innerText = cell.isFlagged ? '🚩' : '';
            cell.el.classList.toggle('flag');
            
            const flags = document.querySelectorAll('.flag').length;
            mineCountEl.innerText = MINES - flags;
        }

        function endGame(win) {
            gameOver = true;
            clearInterval(timer);
            
            board.flat().forEach(cell => {
                if (cell.isMine) {
                    cell.el.innerText = '💣';
                    cell.el.classList.add('mine');
                }
            });

            setTimeout(async () => {
                if (win) {
                    const playerName = prompt("승리했습니다! 🎉 이름을 입력하여 리더보드에 등록하세요:", "지뢰마스터");
                    
                    if (playerName && playerName.trim() !== "") {
                        try {
                            // URL/KEY 미수정 시 경고
                            if(SUPABASE_URL === 'YOUR_SUPABASE_URL') {
                                alert("승리! 단, Supabase URL과 API key 설정이 필요합니다.");
                                return;
                            }

                            // Supabase RPC 함수 호출
                            const { data, error } = await supabaseClient.rpc('submit_score', {
                                p_name: playerName,
                                p_time: seconds,
                                p_rows: ROWS,
                                p_cols: COLS,
                                p_mines: MINES
                            });

                            if (error) throw error;

                            alert(`랭킹 등록 완료! 현재 ${data.rank}위 입니다. 🏆`);
                        } catch (err) {
                            console.error(err);
                            alert("리더보드 등록 중 오류가 발생했습니다. (콘솔 로그 확인)");
                        }
                    }
                } else {
                    alert("지뢰를 밟았습니다! 💥");
                }
            }, 100);
        }

        resetBtn.addEventListener('click', startGame);
        window.onload = startGame;

    </script>
</body>
</html>
